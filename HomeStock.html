<script>
    /**
     * HomeStock Pro - Версия с QR-библиотекой qrcode (canvas)
     * ================= НАСТРОЙКА КАЧЕСТВА =================
     * для качества 70% размер фото ~ 100–150 КБ
     *   IMAGE_MAX_WIDTH: 800,
     *   IMAGE_MAX_HEIGHT: 600,
     *   IMAGE_QUALITY: 0.7,
     *
     * для качества ~ 60% размер фото ~ 60–90 КБ
     *   IMAGE_MAX_WIDTH: 600,
     *   IMAGE_MAX_HEIGHT: 450,
     *   IMAGE_QUALITY: 0.6,
     *
     * для качества ~ 50% размер фото ~ 35–60 КБ
     *   IMAGE_MAX_WIDTH: 500,
     *   IMAGE_MAX_HEIGHT: 375,
     *   IMAGE_QUALITY: 0.5,
     */
    const CONFIG = {
      STORAGE_KEY: 'homeStockItems',
      THEME_KEY: 'homeStockTheme',
      MAX_STORAGE_MB: 5,
      IMAGE_MAX_WIDTH: 500,
      IMAGE_MAX_HEIGHT: 375,
      IMAGE_QUALITY: 0.5,
      DEBOUNCE_DELAY: 300,
      MAX_QUANTITY: 1000000, // Максимальное количество вещей
      MAX_PHOTO_SIZE_MB: 10  // Максимальный размер загружаемого фото до сжатия
    };
    
    /*== ЭМОДЗИ ДЛЯ КАТЕГОРИЙ ==*/
    const CATEGORY_EMOJI = {
      'Запчасти': '🛠',
      'Электроника': '💻',
      'Инструменты': '🔨',
      'Спорт': '🚲',
      'Дом': '🏠',
      'Хобби': '🧵',
      'Другое': '📦',
      'Кухня': '🍳',
      'Уборка': '🧹',
      'Мебель': '🪑',
      'Текстиль': '🧣',
      'Декор': '🖼️',
      'Канцелярия': '✏️',
      'Документы': '📄',
      'Крепёж': '🔩',
      'Сантехника': '🚰',
      'Электрика': '⚡',
      'Краски/химия': '🎨',
      'Садовый инвентарь': '🌿',
      'Сезонные вещи': '❄️☀️',
      'Одежда': '👔',
      'Обувь': '👟',
      'Сумки/рюкзаки': '🎒',
      'Украшения/бижутерия': '💍',
      'Игрушки': '🧸',
      'Детская одежда': '👶',
      'Книги/развивашки': '📚',
      'Детская мебель': '🛏️',
      'Новый год': '🎄',
      'Лето/отдых': '🏖️',
      'Зимний спорт': '⛷️',
      'Запас/расходники': '🔋',
      'Медицина/аптечка': '💊',
      'Косметика/гигиена': '🧴'
    };

    const state = {
      items: [],
      isEditing: false,
      currentDetailId: null,
      qrOpenedFromDetail: false,
      pendingItem: null,      // временные данные для дубликата: { name, category, quantity, location, shelf, notes, photoFile }
      duplicateItemId: null,  // id найденного дубликата
      copyNumber: 1,
      searchDebounce: null,
      currentQRId: null,
      currentTheme: 'light'
    };

    // === УПРАВЛЕНИЕ ТЕМОЙ ===
    function initTheme() {
      const savedTheme = localStorage.getItem(CONFIG.THEME_KEY);

      if (savedTheme) {
        state.currentTheme = savedTheme;
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        state.currentTheme = prefersDark ? 'dark' : 'light';
      }

      applyTheme(state.currentTheme);
      updateThemeButton();

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem(CONFIG.THEME_KEY)) {
          state.currentTheme = e.matches ? 'dark' : 'light';
          applyTheme(state.currentTheme);
          updateThemeButton();
        }
      });
    }

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    }

    function toggleTheme() {
      state.currentTheme = state.currentTheme === 'light' ? 'dark' : 'light';
      localStorage.setItem(CONFIG.THEME_KEY, state.currentTheme);
      applyTheme(state.currentTheme);
      updateThemeButton();
      showToast(`🌓 Тема: ${state.currentTheme === 'dark' ? 'Тёмная' : 'Светлая'}`, 'info');

      // Если открыто модальное окно QR, перерисовываем с новыми цветами
      const qrModal = document.getElementById('qrModal');
      if (qrModal.style.display === 'flex' && state.currentQRId) {
        showQR(state.currentQRId, state.qrOpenedFromDetail);
      }
    }

    function updateThemeButton() {
      const btn = document.getElementById('themeToggle');
      btn.textContent = state.currentTheme === 'dark' ? '☀️' : '🌙';
      btn.title = state.currentTheme === 'dark'
        ? 'Сейчас: Тёмная тема (нажмите для светлой)'
        : 'Сейчас: Светлая тема (нажмите для тёмной)';
    }

    // === ИНИЦИАЛИЗАЦИЯ ===
    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      loadItems();
      updateStorageIndicator();
      // Проверка загрузки библиотеки QR необязательна, она будет в showQR
    });

    function loadItems() {
      try {
        const data = localStorage.getItem(CONFIG.STORAGE_KEY);
        state.items = data ? JSON.parse(data) : [];
        renderItems();
        updateStorageIndicator();
      } catch (error) {
        console.error('Ошибка загрузки:', error);
        showToast('❌ Ошибка загрузки данных', 'error');
        state.items = [];
      }
    }

    function saveItems() {
      try {
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(state.items));
        updateStorageIndicator();
      } catch (error) {
        console.error('Ошибка сохранения:', error);
        showToast('❌ Превышен лимит хранилища!', 'error');
        throw error;
      }
    }

    function updateStorageIndicator() {
      try {
        const data = localStorage.getItem(CONFIG.STORAGE_KEY) || '';
        const usedKB = (new Blob([data]).size / 1024).toFixed(1);
        const maxKB = CONFIG.MAX_STORAGE_MB * 1024;
        const percent = Math.min((usedKB / maxKB) * 100, 100);

        const fill = document.getElementById('storageFill');
        const text = document.getElementById('storageText');

        fill.style.width = `${percent}%`;
        text.textContent = `${usedKB} / ${maxKB} КБ`;

        fill.className = 'storage-fill';
        if (percent > 80) fill.classList.add('danger');
        else if (percent > 60) fill.classList.add('warning');

      } catch (error) {
        console.error('Ошибка индикатора:', error);
      }
    }

    // === РАБОТА С ФОТО ===
    function validatePhotoSize(file) {
      return new Promise((resolve, reject) => {
        if (!file) resolve(null);
        const maxSizeBytes = CONFIG.MAX_PHOTO_SIZE_MB * 1024 * 1024;
        if (file.size > maxSizeBytes) {
          reject(new Error(`Фото слишком большое (макс. ${CONFIG.MAX_PHOTO_SIZE_MB} МБ)`));
        } else {
          resolve(file);
        }
      });
    }

    function compressImage(file, maxWidth = CONFIG.IMAGE_MAX_WIDTH, maxHeight = CONFIG.IMAGE_MAX_HEIGHT) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > maxWidth || height > maxHeight) {
              const ratio = Math.min(maxWidth / width, maxHeight / height);
              width = width * ratio;
              height = height * ratio;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            const compressed = canvas.toDataURL('image/jpeg', CONFIG.IMAGE_QUALITY);
            resolve(compressed);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // === ПОИСК ===
    function handleSearchInput() {
      clearTimeout(state.searchDebounce);
      state.searchDebounce = setTimeout(() => {
        renderItems();
        updateSearchClearButton();
      }, CONFIG.DEBOUNCE_DELAY);
    }

    function updateSearchClearButton() {
      const search = document.getElementById('search');
      const clearBtn = document.getElementById('searchClear');
      clearBtn.classList.toggle('visible', search.value.trim().length > 0);
    }

    function clearSearch() {
      document.getElementById('search').value = '';
      updateSearchClearButton();
      renderItems();
    }
    
    // === ФУНКЦИИ ДЛЯ СТАТИСТИКИ ===
    function filterAllItems() {
      const searchInput = document.getElementById('search');
      searchInput.value = ''; // очищаем поиск
      updateSearchClearButton();
      renderItems();
      closeStatsModal();
    }

    function showAllCategories() {
      const searchInput = document.getElementById('search');
      searchInput.value = ''; // очищаем поиск
      updateSearchClearButton();
      renderItems(); // обновляем отображение (показываем все товары)
      closeStatsModal();
      showToast('Все категории отображаются выше', 'info');
    }

    function filterWithPhotos() {
      const searchInput = document.getElementById('search');
      searchInput.value = '📷'; // специальный маркер
      updateSearchClearButton();
      renderItems();
      closeStatsModal();
    }

    function showStorageDetails() {
      const data = localStorage.getItem(CONFIG.STORAGE_KEY) || '';
      const usedKB = (new Blob([data]).size / 1024).toFixed(1);
      const maxKB = CONFIG.MAX_STORAGE_MB * 1024;
      const percent = ((usedKB / maxKB) * 100).toFixed(1);
  
      showToast(`💾 Использовано: ${usedKB} КБ из ${maxKB} КБ (${percent}%)`, 'info', 5000);
      closeStatsModal();
    }
    // ==================================
    
    function filterByCategory(category) {
    // Устанавливаем значение поиска
      const searchInput = document.getElementById('search');
      searchInput.value = category;
  
      // Обновляем кнопку очистки поиска
      updateSearchClearButton();
  
      // Фильтруем и перерисовываем
      renderItems();
  
      // Закрываем окно статистики (опционально)
      closeStatsModal();
    }

    function showToast(message, type = 'info', duration = 3000) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    // === СТАТИСТИКА И УПРАВЛЕНИЕ БАЗОЙ ===
    function showStatsModal() {
      updateStatsData();
      document.getElementById('statsModal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeStatsModal() {
      document.getElementById('statsModal').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    function updateStatsData() {
      document.getElementById('statTotal').textContent = state.items.length;

      const categories = {};
      let withPhotos = 0;

      state.items.forEach(item => {
        categories[item.category] = (categories[item.category] || 0) + 1;
        if (item.photo) withPhotos++;
      });

      document.getElementById('statCategories').textContent = Object.keys(categories).length;
      document.getElementById('statWithPhotos').textContent = withPhotos;

      const data = localStorage.getItem(CONFIG.STORAGE_KEY) || '';
      const usedKB = (new Blob([data]).size / 1024).toFixed(1);
      const maxKB = CONFIG.MAX_STORAGE_MB * 1024;
      const percent = Math.min((usedKB / maxKB) * 100, 100).toFixed(1);
      document.getElementById('statStorage').textContent = `${percent}%`;

      // +++ Добавляем обработчики кликов для статистических показателей +++
      document.getElementById('statTotal').parentElement.onclick = filterAllItems;
      document.getElementById('statTotal').parentElement.style.cursor = 'pointer';
  
      document.getElementById('statCategories').parentElement.onclick = showAllCategories;
      document.getElementById('statCategories').parentElement.style.cursor = 'pointer';
  
      document.getElementById('statWithPhotos').parentElement.onclick = filterWithPhotos;
      document.getElementById('statWithPhotos').parentElement.style.cursor = 'pointer';
  
      document.getElementById('statStorage').parentElement.onclick = showStorageDetails;
      document.getElementById('statStorage').parentElement.style.cursor = 'pointer';
      // ============================================================

      const categoryList = document.getElementById('categoryList');
      categoryList.innerHTML = '';

      Object.entries(categories).forEach(([cat, count]) => {
        const div = document.createElement('div');
        div.className = 'category-item';
        div.setAttribute('onclick', `filterByCategory('${escapeHtml(cat)}')`);
        div.style.cursor = 'pointer';

        const emoji = CATEGORY_EMOJI[cat] || '📦';
        div.innerHTML = `
          <span class="category-name">${emoji} ${escapeHtml(cat)}</span>
          <span class="category-count">${count}</span>
        `;
        categoryList.appendChild(div);
      });
    }

    function exportData() {
      try {
        const dataStr = JSON.stringify(state.items, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        const timestamp = new Date().toISOString().split('T')[0];
        link.href = url;
        link.download = `homestock_backup_${timestamp}_${state.items.length}items.json`;
        link.click();
        URL.revokeObjectURL(url);
        showToast('✅ База экспортирована', 'success');
        closeStatsModal();
      } catch (error) {
        showToast('❌ Ошибка экспорта', 'error');
      }
    }

    function importData(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!Array.isArray(imported)) {
            showToast('❌ Неверный формат файла', 'error');
            return;
          }

          const action = confirm(
            `Найдено ${imported.length} вещей.\n\n✅ ОК - Заменить текущую базу\n❌ Отмена - Объединить с текущей`
          );

          if (action) {
            state.items = imported;
          } else {
            // При объединении избегаем дубликатов ID
            const existingIds = new Set(state.items.map(i => i.id));
            imported.forEach(item => {
              if (!existingIds.has(item.id)) {
                state.items.push(item);
              } else {
                // Генерируем новый ID, если такой уже есть
                const newItem = { ...item, id: Date.now() + Math.floor(Math.random() * 1000) };
                state.items.push(newItem);
              }
            });
          }

          saveItems();
          renderItems();
          showToast(`✅ Импортировано ${imported.length} вещей`, 'success');
          closeStatsModal();
        } catch (error) {
          showToast('❌ Ошибка импорта: ' + error.message, 'error');
        }
      };
      reader.readAsText(file);
      input.value = '';
    }

    function showClearConfirm() {
      document.getElementById('clearItemCount').textContent = state.items.length;
      document.getElementById('clearConfirmModal').style.display = 'flex';
    }

    function closeClearConfirm() {
      document.getElementById('clearConfirmModal').style.display = 'none';
    }

    function clearDatabase() {
      // Подтверждение уже получено через модальное окно
      state.items = [];
      localStorage.removeItem(CONFIG.STORAGE_KEY);
      updateStorageIndicator();
      renderItems();
      closeClearConfirm();
      closeStatsModal();
      showToast('✅ База данных очищена!', 'success');
    }

    function exportBeforeClear() {
      exportData();
      closeClearConfirm();
      setTimeout(() => showClearConfirm(), 500);
    }

    // === ОСНОВНАЯ ЛОГИКА ===
    function findDuplicates(name, category, location, shelf) {
      const norm = (str) => str.trim().toLowerCase();
      return state.items.filter(item =>
        norm(item.name) === norm(name) &&
        item.category === category &&
        norm(item.location) === norm(location) &&
        norm(item.shelf) === norm(shelf)
      );
    }

    function getCopyNumber(baseName, category, location, shelf) {
      const norm = (str) => str.trim().toLowerCase();
      const copies = state.items.filter(item => {
        const match = item.name.match(/\(копия\s*(\d+)\)/i);
        return norm(item.name).startsWith(norm(baseName)) &&
          item.category === category &&
          norm(item.location) === norm(location) &&
          norm(item.shelf) === norm(shelf) &&
          match;
      });

      let max = 0;
      copies.forEach(item => {
        const match = item.name.match(/\(копия\s*(\d+)\)/i);
        if (match && parseInt(match[1]) > max) max = parseInt(match[1]);
      });

      return max + 1;
    }

    function getBaseName(name) {
      return name.replace(/\s*\(копия\s*\d+\)\s*/i, '').trim();
    }

    async function checkAndAddItem() {
      if (state.isEditing && document.getElementById('editId').value) {
        addItem();
        return;
      }

      const name = document.getElementById('name').value.trim();
      const category = document.getElementById('category').value;
      const quantity = document.getElementById('quantity').value;
      const location = document.getElementById('location').value.trim();
      const shelf = document.getElementById('shelf').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const photoInput = document.getElementById('photo');

      if (!name || !location) {
        showToast('⚠️ Введите название и место', 'warning');
        return;
      }

      // +++ Проверка количества +++
      const quantityNum = parseInt(quantity);
      if (isNaN(quantityNum) || quantityNum < 1) {
        showToast('⚠️ Количество должно быть положительным числом', 'warning');
        return;
      }
      if (quantityNum > CONFIG.MAX_QUANTITY) {
        showToast('⚠️ Максимальное количество — ' + CONFIG.MAX_QUANTITY, 'warning');
        return;
      }
      // ============================

      const duplicates = findDuplicates(name, category, location, shelf);

      if (duplicates.length > 0) {
        // Сохраняем файл и данные, используя числовое количество
        const photoFile = photoInput.files[0] || null;
        state.duplicateItemId = duplicates[0].id;
        state.pendingItem = {
          name,
          category,
          quantity: quantityNum,   // теперь число
          location,
          shelf,
          notes,
          photoFile
        };

        const baseName = getBaseName(name);
        state.copyNumber = getCopyNumber(baseName, category, location, shelf);

        document.getElementById('dupName').textContent = duplicates[0].name;
        document.getElementById('dupLocation').textContent = duplicates[0].location;
        document.getElementById('dupShelf').textContent = duplicates[0].shelf || 'Не задано';
        document.getElementById('dupQuantity').textContent = duplicates[0].quantity;
        document.getElementById('addQty').textContent = quantityNum; // используем число

        if (duplicates[0].notes && duplicates[0].notes.trim()) {
          document.getElementById('dupNotesRow').style.display = 'block';
          document.getElementById('dupNotes').textContent = duplicates[0].notes;
        } else {
          document.getElementById('dupNotesRow').style.display = 'none';
        }

        const newCopyName = `${baseName} (Копия ${state.copyNumber})`;
        document.getElementById('newName').textContent = newCopyName;
        document.getElementById('newQuantity').textContent = quantityNum; // число
        document.getElementById('copyLabel').textContent = `(Копия ${state.copyNumber})`;
        document.getElementById('duplicatePreview').style.display = 'block';

        document.getElementById('duplicateModal').style.display = 'flex';
        return;
      }

      // Нет дубликатов — сразу добавляем
      await processNewItem(name, category, quantityNum, location, shelf, notes, photoInput.files[0]);
    }

    async function processNewItem(name, category, quantity, location, shelf, notes, photoFile) {
      try {
        let photoData = null;
        if (photoFile) {
          await validatePhotoSize(photoFile);
          showToast('⏳ Сжатие фото...', 'info');
          photoData = await compressImage(photoFile);
          const sizeKB = (new Blob([photoData]).size / 1024).toFixed(1);
          showToast(`✅ Фото сжато до ${sizeKB} КБ`, 'success');
        }

        const newItem = {
          id: Date.now(),
          name,
          category,
          quantity: quantity,
          location,
          shelf: shelf || '',
          notes,
          photo: photoData,
          createdAt: new Date().toISOString()
        };

        state.items.push(newItem);
        saveItems();
    
        // +++ Очищаем поиск перед рендерингом +++
        const searchInput = document.getElementById('search');
        searchInput.value = '';
        updateSearchClearButton();
        // ====================================
    
        renderItems();
        clearForm();
        showToast('✅ Вещь добавлена', 'success');

      } catch (error) {
        console.error(error);
        showToast('❌ Ошибка: ' + error.message, 'error');
      }
    }

    function addQuantityToDuplicate() {
      const item = state.items.find(i => i.id === state.duplicateItemId);
      if (!item) return;

      // +++ Проверка текущего и добавляемого количества +++
      const currentQty = parseInt(item.quantity);
      const addQty = parseInt(state.pendingItem.quantity);
      if (isNaN(currentQty) || isNaN(addQty) || addQty < 1) {
        showToast('❌ Ошибка: некорректное количество', 'error');
        closeDuplicateModal();
        return;
      }
      // ====================================================

      const newQty = currentQty + addQty;
      if (newQty > CONFIG.MAX_QUANTITY) {
        showToast('⚠️ Суммарное количество не может превышать ' + CONFIG.MAX_QUANTITY, 'error');
        closeDuplicateModal();
        return;
      }
      item.quantity = newQty;
      saveItems();
      renderItems();
      clearForm();
      showToast('✅ Количество обновлено', 'success');
      closeDuplicateModal();
    }

    async function addAsCopy() {
      if (state.pendingItem) {
        const baseName = getBaseName(state.pendingItem.name);
        const newCopyName = `${baseName} (Копия ${state.copyNumber})`;
        await processNewItem(
          newCopyName,
          state.pendingItem.category,
          state.pendingItem.quantity,
          state.pendingItem.location,
          state.pendingItem.shelf,
          state.pendingItem.notes,
          state.pendingItem.photoFile   // передаём файл, а не input
        );
      }
      closeDuplicateModal();
    }

    function cancelAddDuplicate() {
      closeDuplicateModal();
    }

    function closeDuplicateModal() {
      document.getElementById('duplicateModal').style.display = 'none';
      document.getElementById('duplicatePreview').style.display = 'none';
      state.pendingItem = null;
      state.duplicateItemId = null;
      state.copyNumber = 1;
    }

    async function addItem() {
      const editId = document.getElementById('editId').value;
      const name = document.getElementById('name').value.trim();
      const category = document.getElementById('category').value;
      const quantity = document.getElementById('quantity').value;
      const location = document.getElementById('location').value.trim();
      const shelf = document.getElementById('shelf').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const photoInput = document.getElementById('photo');

      // +++ Проверка количества +++
      const quantityNum = parseInt(quantity);
      if (isNaN(quantityNum) || quantityNum < 1) {
        showToast('⚠️ Количество должно быть положительным числом', 'warning');
        return;
      }
      if (quantityNum > CONFIG.MAX_QUANTITY) {
        showToast('⚠️ Максимальное количество — ' + CONFIG.MAX_QUANTITY, 'warning');
        return;
      }
      // ============================

      const processItem = async (photoData) => {
        const itemIndex = state.items.findIndex(item => item.id == editId);
        if (itemIndex === -1) return;

        const existingItem = state.items[itemIndex];
        existingItem.name = name;
        existingItem.category = category;
        existingItem.quantity = quantityNum;   // используем число
        existingItem.location = location;
        existingItem.shelf = shelf;
        existingItem.notes = notes;
        if (photoData) existingItem.photo = photoData;

        saveItems();
        renderItems();
        cancelEdit();

        if (state.currentDetailId == editId) {
          openDetailModal(editId);
        }

        showToast('✅ Изменения сохранены', 'success');
      };

      try {
        if (photoInput.files && photoInput.files[0]) {
          await validatePhotoSize(photoInput.files[0]);
          const photoData = await compressImage(photoInput.files[0]);
          await processItem(photoData);
        } else {
          await processItem(null);
        }
      } catch (error) {
        showToast('❌ Ошибка: ' + error.message, 'error');
      }
    }

    function sortItems(itemsToSort) {
      const sorted = [...itemsToSort];
      const type = document.getElementById('sortSelect').value;

      switch (type) {
        case 'newest':
          sorted.sort((a, b) => {
            const da = a.createdAt ? new Date(a.createdAt) : 0;
            const db = b.createdAt ? new Date(b.createdAt) : 0;
            return db - da;
          });
          break;
        case 'oldest':
          sorted.sort((a, b) => {
            const da = a.createdAt ? new Date(a.createdAt) : 0;
            const db = b.createdAt ? new Date(b.createdAt) : 0;
            return da - db;
          });
          break;
        case 'name-asc':
          sorted.sort((a, b) => a.name.localeCompare(b.name, 'ru'));
          break;
        case 'name-desc':
          sorted.sort((a, b) => b.name.localeCompare(a.name, 'ru'));
          break;
      }

      return sorted;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderItems() {
      const container = document.getElementById('itemsContainer');
      const search = document.getElementById('search').value.toLowerCase();

      let filtered = state.items.filter(item => {
      // Если поиск равен '📷', фильтруем по наличию фото
      if (search === '📷') {
        return item.photo; // true если есть фото
      }
    
      // Иначе обычный поиск
      return item.name.toLowerCase().includes(search) ||
           item.category.toLowerCase().includes(search) ||
           item.location.toLowerCase().includes(search) ||
           (item.shelf && item.shelf.toLowerCase().includes(search)) ||
           (item.notes && item.notes.toLowerCase().includes(search));
      });

      filtered = sortItems(filtered);

      if (filtered.length === 0) {
        let emptyMessage = 'Вещи не найдены';
        let emptyIcon = '📦';
        if (search === '📷') {
          emptyMessage = 'Товары с фото не найдены';
          emptyIcon = '📷';
        } else if (search) {
          emptyMessage = `Ничего не найдено по запросу «${search}»`;
        }
        container.innerHTML = `
           <div class="empty-state" style="grid-column: span 3;">
              <div class="empty-state-icon">${emptyIcon}</div>
              <h3>${emptyMessage}</h3>
              <p>Попробуйте изменить запрос</p>
           </div>
        `;
        return;
      }

      container.innerHTML = '';
      const fragment = document.createDocumentFragment();

      filtered.forEach(item => {
        const card = createItemCard(item);
        fragment.appendChild(card);
      });

      container.appendChild(fragment);
    }

    function createItemCard(item) {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.onclick = (e) => {
        if (!e.target.closest('button')) openDetailModal(item.id);
      };

      const imgDisplay = item.photo
        ? `<img src="${item.photo}" class="item-img" alt="${escapeHtml(item.name)}" loading="lazy">`
        : `<div class="item-img">📷</div>`;

      const noteDisplay = item.notes && item.notes.trim()
        ? `<div class="item-note">📝 ${escapeHtml(item.notes)}</div>`
        : '';

      const shelfDisplay = item.shelf && item.shelf.trim() ? escapeHtml(item.shelf) : '—';
      const locationDisplay = escapeHtml(item.location);

      card.innerHTML = `
        ${imgDisplay}
        <div class="item-body">
          <div class="item-title">${escapeHtml(item.name)}</div>
          <span class="item-cat">${escapeHtml(item.category)}</span>
          <div class="item-details item-location">📍 ${locationDisplay}</div>
          <div class="item-details">📦 ${shelfDisplay}</div>
          <div class="item-details">🔢 Кол-во: ${item.quantity}</div>
          ${noteDisplay}
          <div class="card-buttons">
            <button class="btn-card btn-edit" onclick="editItem(${item.id})" aria-label="Редактировать">✏️</button>
            <button class="btn-card btn-qr" onclick="showQR(${item.id}, false)" aria-label="Показать QR-код">📱</button>
            <button class="btn-card btn-delete" onclick="deleteItem(${item.id})" aria-label="Удалить">🗑️</button>
          </div>
        </div>
      `;

      return card;
    }

    function printQR() {
      const id = state.currentQRId || state.currentDetailId;
      if (!id) {
        showToast('Не удалось определить вещь для печати', 'error');
        return;
      }

      const item = state.items.find(i => i.id === id);
      if (!item) return;

      const qrCanvas = document.getElementById('qrcode');
      if (!qrCanvas) return;

      // Получаем canvas как Blob
      qrCanvas.toBlob((blob) => {
        if (!blob) {
          showToast('Не удалось создать изображение QR', 'error');
          return;
        }

        // Создаём временный URL для Blob
        const blobUrl = URL.createObjectURL(blob);

        // Создаём окно для печати
        const printWindow = window.open('', '_blank');
        if (!printWindow) {
          showToast('Не удалось открыть окно для печати. Разрешите всплывающие окна.', 'error');
          URL.revokeObjectURL(blobUrl);
          return;
        }
        printWindow.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>Печать QR-кода: ${escapeHtml(item.name)}</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                text-align: center;
                padding: 20px;
                margin: 0;
              }
              .qr-container {
                margin: 30px auto;
                max-width: 300px;
              }
              .qr-container img {
                width: 100%;
                height: auto;
                border: 1px solid #ccc;
                padding: 10px;
                border-radius: 8px;
                background: white;
              }
              .item-info {
                margin-top: 20px;
                font-size: 14px;
                color: #333;
              }
              .item-info p {
                margin: 5px 0;
              }
              @media print {
                body { padding: 0; }
                .qr-container { margin: 0 auto; }
              }
            </style>
          </head>
          <body>
            <h2>${escapeHtml(item.name)}</h2>
            <div class="qr-container">
              <img src="${blobUrl}" alt="QR-код" onload="this.style.display='block'">
            </div>
            <div class="item-info">
              <p><strong>📍 Место:</strong> ${escapeHtml(item.location)}</p>
              ${item.shelf ? `<p><strong>📦 Полка:</strong> ${escapeHtml(item.shelf)}</p>` : ''}
              <p><strong>🔢 Количество:</strong> ${item.quantity}</p>
              ${item.notes ? `<p><strong>📝 Заметка:</strong> ${escapeHtml(item.notes)}</p>` : ''}
            </div>
            <script>
              // Очищаем URL после загрузки изображения, но не сразу
              window.onload = function() {
                setTimeout(() => {
                  window.print();
                  // Можно закрыть окно после печати (раскомментируйте при желании)
                  // window.onafterprint = () => window.close();
                }, 100);
              };
            <\/script>
          </body>
          </html>
        `);

        printWindow.document.close();
        // Освобождаем blobUrl после того, как окно загрузит изображение
        // (но не раньше, иначе изображение исчезнет)
        setTimeout(() => {
          URL.revokeObjectURL(blobUrl);
        }, 5000); // для надёжности
      }, 'image/png');
    }

    function clearForm() {
      document.getElementById('name').value = '';
      document.getElementById('location').value = '';
      document.getElementById('shelf').value = '';
      document.getElementById('notes').value = '';
      document.getElementById('quantity').value = '1';
      document.getElementById('photo').value = '';
      document.getElementById('category').value = 'Запчасти';
    }

    function editItem(id) {
      const item = state.items.find(i => i.id === id);
      if (!item) return;

      document.getElementById('editId').value = item.id;
      document.getElementById('name').value = item.name;
      document.getElementById('category').value = item.category;
      document.getElementById('quantity').value = item.quantity;
      document.getElementById('location').value = item.location;
      document.getElementById('shelf').value = item.shelf || '';
      document.getElementById('notes').value = item.notes || '';
      document.getElementById('photo').value = '';

      document.getElementById('btnAdd').textContent = '💾 Сохранить';
      document.getElementById('btnAdd').style.backgroundColor = 'var(--secondary)';
      document.getElementById('btnCancel').style.display = 'block';
      state.isEditing = true;
      document.querySelector('.add-form').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
      clearForm();
      document.getElementById('editId').value = '';
      document.getElementById('btnAdd').textContent = '➕ Добавить в каталог';
      document.getElementById('btnAdd').style.backgroundColor = 'var(--primary)';
      document.getElementById('btnCancel').style.display = 'none';
      state.isEditing = false;
    }

    function deleteItem(id) {
      if (confirm('Удалить эту вещь?')) {
        state.items = state.items.filter(item => item.id !== id);
        saveItems();
        renderItems();
        showToast('✅ Вещь удалена', 'success');

        if (state.currentDetailId == id) {
          closeDetailModal();
        }
      }
    }

    function openDetailModal(id) {
      const item = state.items.find(i => i.id === id);
      if (!item) return;

      state.currentDetailId = id;
      const modal = document.getElementById('detailModal');

      const detailImage = document.getElementById('detailImage');
      if (item.photo) {
        detailImage.src = item.photo;
        detailImage.style.display = 'block';
        detailImage.onclick = () => openZoomModal(item.photo);
      } else {
        detailImage.style.display = 'none';
        detailImage.onclick = null;
      }

      document.getElementById('detailTitle').textContent = item.name;
      document.getElementById('detailCategory').textContent = item.category;
      document.getElementById('detailLocation').textContent = item.location;
      document.getElementById('detailShelf').textContent = item.shelf && item.shelf.trim() ? item.shelf : 'Не задано';
      document.getElementById('detailQuantity').textContent = item.quantity;

      const noteSection = document.getElementById('detailNoteSection');
      const noteText = document.getElementById('detailNoteText');
      if (item.notes && item.notes.trim()) {
        noteSection.style.display = 'block';
        noteText.textContent = item.notes;
      } else {
        noteSection.style.display = 'none';
      }

      if (item.createdAt) {
        const date = new Date(item.createdAt);
        document.getElementById('detailCreated').textContent =
          `Добавлено: ${date.toLocaleDateString('ru-RU')} в ${date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}`;
      } else {
        document.getElementById('detailCreated').textContent = '';
      }

      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeDetailModal() {
      document.getElementById('detailModal').style.display = 'none';
      document.body.style.overflow = 'auto';
      state.currentDetailId = null;
    }

    function openZoomModal(imageSrc) {
      const modal = document.getElementById('zoomModal');
      const zoomImage = document.getElementById('zoomImage');
      zoomImage.src = imageSrc;
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function openZoomModalFromDetail() {
      const img = document.getElementById('detailImage');
      if (img.src) openZoomModal(img.src);
    }

    function closeZoomModal(event) {
      if (!event || event.target.id === 'zoomModal' || event.target.classList.contains('zoom-close')) {
        const modal = document.getElementById('zoomModal');
        modal.classList.remove('show');
        document.body.style.overflow = 'auto';
        setTimeout(() => {
          document.getElementById('zoomImage').src = '';
        }, 200);
      }
    }

    function editFromDetail() {
      const id = state.currentDetailId; // сохраняем ID
      if (id) {
        closeDetailModal(); // закрываем детальное окно (сбрасывает state.currentDetailId)
        editItem(id);       // открываем форму редактирования с сохранённым ID
      }
    }

    function showQRFromDetail() {
      if (state.currentDetailId) {
        state.qrOpenedFromDetail = true;
        showQR(state.currentDetailId, true);
      }
    }

    function deleteFromDetail() {
      if (state.currentDetailId) {
        deleteItem(state.currentDetailId);
      }
    }

    function backToDetail() {
      closeQRModal();
      if (state.currentDetailId) {
        setTimeout(() => {
          openDetailModal(state.currentDetailId);
        }, 100);
      }
    }

    // Функция showQR с использованием QRCode.toCanvas
    function showQR(id, fromDetail = false) {
      const item = state.items.find(i => i.id === id);
      if (!item) return;

      // Проверяем, загрузилась ли библиотека
      if (typeof QRCode === 'undefined' || typeof QRCode.toCanvas !== 'function') {
        showToast('❌ Библиотека QR не загружена', 'error');
        return;
      }
      state.currentQRId = id;
      const modal = document.getElementById('qrModal');
      const qrCanvas = document.getElementById('qrcode');
      const qrTitle = document.getElementById('qrTitle');
      const btnBack = document.getElementById('btnBackToDetail');
      const btnClose = document.getElementById('btnCloseQR');
      const btnPrint = document.getElementById('btnPrintQR');
      btnPrint.style.display = ''; // сброс к значению из CSS

      qrTitle.textContent = item.name;

      if (fromDetail) {
        btnBack.style.display = 'block';
        btnClose.style.display = 'none';
      } else {
        btnBack.style.display = 'none';
        btnClose.style.display = 'block';
      }

      // === НОВЫЙ ФОРМАТ QR-ДАННЫХ С МЕТКАМИ ===
      let qrData = item.name; // название без метки

      // Место
      qrData += `\n\n📍 Место: ${item.location}`;

      // Полка, если есть
      if (item.shelf && item.shelf.trim()) {
        qrData += `\n\n📦 Полка: ${item.shelf}`;
      }

      // Количество
      qrData += `\n\n🔢 Количество: ${item.quantity}`;

      // Заметка, если есть (обрезаем до 50 символов)
      if (item.notes && item.notes.trim()) {
        let note = item.notes.trim();
        if (note.length > 50) {
          note = note.substring(0, 50) + '…';
        }
        qrData += `\n\n📝 Заметка: ${note}`;
      }

      // Проверяем длину и при необходимости обрезаем

      //Убедитесь, что при обрезке вы отнимаете 3 символа для троеточия: 300 → 297, 500 → 497, 800 → 797
      if (qrData.length > 500) {
        qrData = qrData.substring(0, 497) + '…';
        showToast('Текст сокращён для QR', 'warning');
      }
      // =====================================

      // Цвета в зависимости от темы
      const darkColor = state.currentTheme === 'dark' ? '#ffffff' : '#000000';
      const lightColor = state.currentTheme === 'dark' ? '#000000' : '#ffffff';

      // Показываем модалку ДО рендеринга, чтобы canvas был видим
      modal.style.display = 'flex';

      // Генерация QR-кода
      QRCode.toCanvas(qrCanvas, qrData, {
        width: 220,
        color: {
          dark: darkColor,
          light: lightColor
        },
        margin: 1
      }, function (error) {
        if (error) {
          console.error('QR error:', error);
          showToast('❌ Не удалось создать QR: ' + error.message, 'error');
        }
      });
    }

    function closeQRModal() {
      document.getElementById('qrModal').style.display = 'none';
      state.qrOpenedFromDetail = false;
      state.currentQRId = null;
    }

    // === ОБЩИЙ ОБРАБОТЧИК КЛИКОВ ПО ЗАТЕНЕНИЮ ===
    window.onclick = function (event) {
      const qrModal = document.getElementById('qrModal');
      const detailModal = document.getElementById('detailModal');
      const duplicateModal = document.getElementById('duplicateModal');
      const clearModal = document.getElementById('clearConfirmModal');
      const statsModal = document.getElementById('statsModal');

      if (event.target == qrModal) {
        if (state.qrOpenedFromDetail) backToDetail();
        else closeQRModal();
      }
      if (event.target == detailModal && !state.qrOpenedFromDetail) closeDetailModal();
      if (event.target == duplicateModal) cancelAddDuplicate();
      if (event.target == clearModal) closeClearConfirm();
      if (event.target == statsModal) closeStatsModal();
    };

    // === ЕДИНЫЙ ОБРАБОТЧИК КЛАВИШИ ESC ===
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        // Зум-модалка имеет наивысший приоритет
        const zoomModal = document.getElementById('zoomModal');
        if (zoomModal.classList.contains('show')) {
          closeZoomModal({ target: zoomModal });
          return;
        }

        const modals = [
          { id: 'clearConfirmModal', fn: closeClearConfirm },
          { id: 'duplicateModal', fn: cancelAddDuplicate },
          { id: 'qrModal', fn: () => state.qrOpenedFromDetail ? backToDetail() : closeQRModal() },
          { id: 'detailModal', fn: closeDetailModal },
          { id: 'statsModal', fn: closeStatsModal }
        ];

        for (const modal of modals) {
          if (document.getElementById(modal.id).style.display === 'flex') {
            modal.fn();
            break;
          }
        }
      }
    });
  </script>
